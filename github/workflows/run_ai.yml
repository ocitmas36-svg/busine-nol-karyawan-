name: Jalankan Bisnis AI Otonom Rosit

on:
  workflow_dispatch: # Tombol manual di HP
  schedule:
    - cron: '0 0 * * *' # Otomatis jalan sendiri setiap jam 12 malam

jobs:
  run-ai-system:
    runs-on: ubuntu-latest # <--- Sudah diperbaiki dari runs-down
    steps:
    - name: Ambil Kode dari Repositori
      uses: actions/checkout@v4

    - name: Siapkan Python di Server GitHub
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instal Bahan (Dependencies)
      run: |
        pip install -r requirements.txt

    - name: Jalankan AI Koreksi Diri
      env:
        AI_API_KEY: ${{ secrets.AI_API_KEY }}
      run: |
        python app.py

    - name: Simpan Otomatis Hasil Kerja AI ke GitHub
      run: |
        git config --global user.name "Rosit Otonom Bot"
        git config --global user.email "bot@github.com"
        git add laporan_bisnis_ai.json
        git commit -m "Update otomatis hasil kerja & koreksi diri AI [Skip CI]" || exit 0
        git push
        
